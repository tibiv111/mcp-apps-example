<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Shiny unavailable</title>
  <style>
    body { background:#0d0d10; color:#e6e6ea;
      font-family:system-ui,-apple-system,sans-serif; padding:24px; margin:0 }
    h1 { font-size:14px; letter-spacing:.16em; color:#7a8087;
      text-transform:uppercase; margin:0 0 12px 0; font-weight:500 }
    p { font-size:13px; color:#9aa0aa; margin:0 0 8px 0; line-height:1.55 }
    code { font-family:'JetBrains Mono',monospace; font-size:12px; color:#e8746e }
  </style>
  <script>{{ handshake_js | safe }}</script>
</head>
<body>
  <h1>Shiny embed unavailable</h1>
  <p>Server tried to fetch Shiny but the upstream failed:
    <code>{{ error }}</code></p>
  <p>On Render's free tier this is usually a cold-start; retry in 30–60s.
    If it persists, check the Shiny service logs and the
    <code>SHINY_URL</code> env var.</p>
</body>
</html>
