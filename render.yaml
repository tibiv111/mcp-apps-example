services:
  # ─── Frontend (the MCP server Claude talks to) ────────────────────────────
  - type: web
    name: nav-ai-mock-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      # Set after first deploy to this service's own URL, e.g.
      #   https://nav-ai-mock-mcp.onrender.com
      # Without it the iframe's SSE callbacks fall back to localhost and
      # break inside Claude.
      - key: BASE_URL
        sync: false
      # Set after the BACKEND service is deployed, to its URL, e.g.
      #   https://nav-ai-mock-backend.onrender.com
      # Without it the lookup_product tool calls /backend/mcp on THIS
      # service (combined-mode default) instead of the separate backend.
      - key: BACKEND_URL
        sync: false
      # Set after the SHINY service is deployed, to its URL, e.g.
      #   https://nav-ai-mock-shiny.onrender.com
      # The "Shiny" launcher tab iframes this URL. If unset/empty the
      # tab renders a "not configured" placeholder and the other views
      # are unaffected.
      - key: SHINY_URL
        sync: false

  # ─── Backend (called by the frontend's lookup_product tool) ───────────────
  - type: web
    name: nav-ai-mock-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend_main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      # Set after the FRONTEND service is deployed, to its URL, e.g.
      #   https://nav-ai-mock-mcp.onrender.com
      # The backend POSTs to {FRONTEND_URL}/oauth/introspect to validate
      # bearer tokens. Without it the backend will reject every token,
      # since it has no shared state with the frontend.
      - key: FRONTEND_URL
        sync: false

  # ─── Shiny experimental view (iframed by the frontend) ────────────────────
  # Docker-based because Render has no native R runtime. The Dockerfile
  # lives at shiny/Dockerfile and runs `shiny::runApp` directly on $PORT
  # — no Shiny Server, no Posit Connect. Free-tier cold-start is 30–60s
  # because the R runtime takes a beat to boot.
  - type: web
    name: nav-ai-mock-shiny
    runtime: docker
    plan: free
    rootDir: shiny
    dockerfilePath: ./Dockerfile
    envVars:
      # Set to the FRONTEND service URL, e.g.
      #   https://nav-ai-mock-mcp.onrender.com
      # The Shiny server-side R code polls {NAV_AI_URL}/dashboard/snapshot
      # every 3s — that endpoint lives on the FRONTEND service (it aggregates
      # from the backend internally). Unauthenticated; no bearer required.
      - key: NAV_AI_URL
        sync: false
